<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Phantom Energy Cost Calculator — Discover how much your idle devices cost you in money and CO₂ emissions.">
  <title>Phantom Energy Cost Calculator — Sign In</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <div class="auth-container">
    <div class="glass-card auth-card glass-card--static">

      <!-- Logo -->
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <h1>Phantom Energy Cost Calculator</h1>
        <p class="text-muted">Uncover the hidden cost of idle devices</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" id="tab-login">Sign In</button>
        <button class="auth-tab" data-tab="signup" id="tab-signup">Create Account</button>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-submit-btn">Sign In</button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="hidden">
        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" class="form-input" id="signup-password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <input type="password" class="form-input" id="signup-confirm" placeholder="••••••••" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-success btn-block btn-lg" id="signup-submit-btn">Create Account</button>
      </form>

      <p class="text-muted text-sm mt-lg" style="text-align:center">
        🔒 Secured with Supabase Authentication
      </p>

    </div>
  </div>

  <div id="error-output" style="color: red; position: fixed; top: 0; left: 0; z-index: 9999; background: black; padding: 10px; display: none;"></div>
  <script>
    window.addEventListener('error', function(e) {
      const out = document.getElementById('error-output');
      out.style.display = 'block';
      out.innerText += 'Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno + '\n';
    });
    window.addEventListener('unhandledrejection', function(e) {
      const out = document.getElementById('error-output');
      out.style.display = 'block';
      out.innerText += 'Unhandled Promise Rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '\n';
    });
  </script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
</body>
</html>
